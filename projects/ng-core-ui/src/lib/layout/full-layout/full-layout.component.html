@switch (layoutState()) {
  @case ('ready') {
<mat-sidenav-container class="extra-sidenav-container h-screen">

      <mat-sidenav position="end" mode="over" class="extra-sidenav bg-primary text-on-primary"
                   [opened]="extraSidenavOpen()"
                   (closed)="extraSidenavOpen.set(false)">
        <core-app-switcher (close)="closeExtraSidenav()" />
      </mat-sidenav>

      <mat-sidenav-content>
        <aside #sidenav class="sidenav bg-tertiary text-on-tertiary" [class.collapsed]="!isExpanded()" role="navigation" aria-label="Primary">
          <mat-nav-list class="nav-list">
            @for (link of sortedMenuRoots(); track link) {
              <a
                mat-list-item
                class="nav-item"
                [routerLink]="[endpointFor(link)]"
                [activated]="isActive(link)"
                [attr.aria-label]="link.name || link.id"
                [matTooltip]="link.name || link.id"
                [matTooltipDisabled]="isExpanded()"
                matTooltipPosition="right"
              >
                <mat-icon>{{ link.icon || 'chevron_right' }}</mat-icon>
                <span class="label" [class.hidden]="!isExpanded()">{{ link.name || link.id }}</span>
              </a>
            }
          </mat-nav-list>
        </aside>

        <main class="flex flex-col flex-1 overflow-hidden">
          <mat-toolbar color="primary" class="toolbar">
            <button mat-icon-button (click)="toggleSidenav()" aria-label="Apri/Chiudi menu" [attr.aria-pressed]="isExpanded()">
              <mat-icon>menu</mat-icon>
            </button>

            <span class="ml-3 font-semibold text-lg text-on-primary">{{ currentPageTitle() }}</span>
            <span class="flex-1"></span>

            <span class="mr-2 font-semibold text-lg text-on-primary">{{ whoami()?.user }}</span>

            <a mat-icon-button [href]="environment()?.logoutPath || '#'" aria-label="Logout">
              <mat-icon>logout</mat-icon>
            </a>
            <button mat-icon-button (click)="openExtraSidenav()" aria-label="Apri menu laterale destro">
              <mat-icon>more_vert</mat-icon>
            </button>
          </mat-toolbar>

          <div class="relative flex-1 overflow-auto">
            <router-outlet />
            <core-confirm />
            <core-alert />
          </div>
        </main>
      </mat-sidenav-content>

    </mat-sidenav-container>
    <core-toast />
  }
  @case ('error') {
   <page-error/>
  }
  @default {
    <core-loading-overlay />
  }
}
