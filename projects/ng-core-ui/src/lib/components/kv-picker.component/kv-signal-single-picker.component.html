<div class="px-6 pt-4 pb-2">
  <mat-form-field class="w-full" subscriptSizing="dynamic">
    <mat-label>Cerca</mat-label>
    <input matInput [value]="filterText()"
      (input)="filterText.set($any($event.target).value)"
      autocomplete="off" class="!text-sm" />
  </mat-form-field>
</div>

<div class="px-6 py-2">
  <core-datatable
    [columns]="columns()"
    [data]="filteredOptions"
    selectionMode="single"
    (selectionChange)="select($event[0])"
    [pageSizeOptions]="[]"
    [initialPageSize]="5"
  />
</div>

<div class="flex justify-end px-6 pb-4">
  <core-button
    variant="filled"
    [label]="data.cancelLabel ?? 'Annulla'"
    (click)="cancel()"
  />
</div>
