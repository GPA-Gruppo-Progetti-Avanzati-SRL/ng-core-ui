@switch (variant()) {
  @case ('icon') {
    <button matButton="filled" [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg !px-0 !min-w-0 !w-10 !h-10">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
    </button>
  }
  @case ('filled') {
    <button matButton="filled" [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
      {{ label() }}
    </button>
  }
  @case ('text') {
    <button matButton="text" [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
      {{ label() }}
    </button>
  }
}
