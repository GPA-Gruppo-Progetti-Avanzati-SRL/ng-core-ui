@switch (variant()) {
  @case ('icon') {
    <button matIconButton [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg" [class]="bgClass()">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
    </button>
  }
  @case ('filled') {
    <button matButton="filled" [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg" [class]="bgClass()">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
      {{ label() }}
    </button>
  }
  @case ('text') {
    <button matButton="text" [disabled]="disabled()" [matTooltip]="tooltip()" class="!rounded-lg" [class]="textClass()">
      @if (icon()) {
        <mat-icon>{{ icon() }}</mat-icon>
      }
      {{ label() }}
    </button>
  }
}
