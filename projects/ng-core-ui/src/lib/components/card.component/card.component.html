<div class="block w-[260px] min-w-[260px] max-w-[260px] h-[404px] min-h-[404px] max-h-[404px] overflow-hidden">
  <div
    class="flex h-full flex-col rounded-[18px]
           border border-[color:var(--mat-sys-outline-variant)]
           bg-[color:var(--mat-sys-surface)] px-6 pt-5 pb-6 box-border"
  >
    <!-- Title -->
    <h2
      class="text-[20px] leading-6 font-normal m-0 tracking-[0.01em]"
      style="color: var(--mat-sys-on-surface)"
    >
      {{ title }}
    </h2>

    <hr class="mt-2 mb-4 border-t border-[color:var(--mat-sys-outline-variant)]" />

    <!-- Icon -->
    <div class="flex-1 flex items-center justify-center">
      <mat-icon
        aria-hidden="true"
        class="card-icon text-[color:var(--mat-sys-primary)]"
      >
        {{ icon }}
      </mat-icon>
    </div>

    <hr class="mt-4 mb-3 border-t border-[color:var(--mat-sys-outline-variant)]" />

    <div class="mt-1 flex flex-col gap-4">
      <p
        class="m-0 text-[13px] leading-[1.4] break-words"
        style="color: var(--mat-sys-on-surface-variant)"
      >
        {{ subtitle }}
      </p>

      <div class="flex justify-end">
        <button
          mat-flat-button
          class="btn-card min-w-[140px] px-6 py-2 text-[13px] font-medium shadow-none
                 bg-[color:var(--mat-sys-tertiary)] text-[color:var(--mat-sys-on-tertiary)]"
          (click)="buttonAction()"
        >
          {{ buttonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
