<div class="block w-65 min-w-65 max-w-65 h-101 min-h-101 max-h-101 overflow-hidden">
  <div
    class="flex h-full flex-col rounded-[18px]
           border border-outline-variant
           bg-surface px-6 pt-4 pb-4 box-border"
  >
    <!-- Title -->
    <h2 class="text-[22px] leading-6 font-normal m-0 tracking-[0.01em] text-on-surface">
      {{ title }}
    </h2>

    <hr class="mt-2 mb-4 border-t border-outline-variant" />

    <!-- Icon -->
    <div class="flex-1 flex items-center justify-center">
      <mat-icon aria-hidden="true" class="w-28! h-28! text-[112px]! bg-transparent!" style="color: var(--mat-sys-primary)">
        {{ icon }}
      </mat-icon>
    </div>

    <hr class="mt-4 mb-3 border-t border-outline-variant" />

    <div class="mt-1 flex flex-col gap-4">
      <p class="m-0 text-[13px] leading-[1.4] wrap-break-word text-on-surface-variant">
        {{ subtitle }}
      </p>

      <div class="flex justify-end">
        <button
          mat-flat-button
          class="min-w-35 px-6 py-2 text-[13px] font-medium shadow-none bg-tertiary text-on-tertiary"
          (click)="buttonClick.emit()"
        >
          {{ buttonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
