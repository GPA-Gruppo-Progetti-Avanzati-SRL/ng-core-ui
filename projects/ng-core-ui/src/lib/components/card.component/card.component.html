<div
  class="card-inner flex flex-col bg-white rounded-xl shadow-md h-full box-border"
  style="border: 1px solid var(--mat-sys-outline-variant); padding: 1rem">

  <!-- Title -->
  <div>
    <h2
      class="text-xl font-semibold m-0 w-full truncate"
      style="color: var(--mat-sys-on-surface)"
    >
      {{ title }}
    </h2>
  </div>

  <!-- Icon block grows to fill remaining height -->
  <div class="flex-1 flex items-center justify-center w-full">
    <mat-icon
      aria-hidden="true"
      class="text-[120px] w-[120px] h-[120px] rounded-2xl p-3"
      style="
        color: var(--mat-sys-primary);
        background-color: var(--mat-sys-primary-container);
        border: 4px solid var(--mat-sys-primary);
      "
    >
      {{ icon }}
    </mat-icon>
  </div>

  <!-- Subtitle + button, stuck to bottom -->
  <div class="flex flex-col gap-3">
    <p
      class="text-sm leading-relaxed w-full break-words line-clamp-2 m-0"
      style="color: var(--mat-sys-on-surface-variant)"
    >
      {{ subtitle }}
    </p>

    <div class="flex justify-end w-full">
      <button
        mat-flat-button
        class="font-semibold rounded-lg"
        style="
          background-color: var(--mat-sys-tertiary);
          color: var(--mat-sys-on-tertiary);
        "
        (click)="buttonAction()"
      >
        {{ buttonLabel }}
      </button>
    </div>
  </div>

</div>
