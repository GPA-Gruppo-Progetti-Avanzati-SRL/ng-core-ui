<div class="flex items-center justify-center min-h-[70vh]">
  <div class="flex flex-col items-start gap-3 bg-white p-5 rounded-2xl shadow-lg w-[280px] min-h-[360px]">

    <!-- Title -->
    <h2 class="text-xl font-semibold m-0 w-full" style="color: var(--mat-sys-on-surface)">
      {{ title }}
    </h2>
    <hr class="w-full border-t m-0" style="border-color: var(--mat-sys-outline-variant)" />

    <!-- Icon -->
    <div class="flex items-center justify-center w-full py-4">
      <mat-icon
        aria-hidden="true"
        class="text-[80px]! w-[80px]! h-[80px]! rounded-2xl p-2"
        style="
          color: var(--mat-sys-primary);
          background-color: var(--mat-sys-primary-container);
          border: 3px solid var(--mat-sys-primary);
        "
      >{{ icon }}</mat-icon>
    </div>

    <hr class="w-full border-t m-0" style="border-color: var(--mat-sys-outline-variant)" />

    <!-- Subtitle -->
    <p class="text-sm leading-relaxed m-0 flex-1" style="color: var(--mat-sys-on-surface-variant)">
      {{ subtitle }}
    </p>

    <!-- Button bottom-right -->
    <div class="flex justify-end w-full mt-auto pt-2">
      <button
        mat-flat-button
        class="font-semibold rounded-lg"
        style="
          background-color: var(--mat-sys-tertiary);
          color: var(--mat-sys-on-tertiary);
        "
        (click)="buttonAction()"
      >
        {{ buttonLabel }}
      </button>
    </div>

  </div>
</div>
