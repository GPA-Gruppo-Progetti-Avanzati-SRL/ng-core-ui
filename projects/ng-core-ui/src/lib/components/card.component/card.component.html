<div class="block w-65 min-w-65 max-w-65">
  <div
    class="flex flex-col overflow-hidden rounded-[18px]
           border border-outline-variant
           bg-surface px-6 pt-4 pb-4 box-border"
  >
    <!-- Title -->
    <h2
      #titleEl
      [matTooltip]="title"
      [matTooltipDisabled]="isTitleTooltipDisabled(titleEl)"
      matTooltipPosition="above"
      class="m-0 truncate pb-1 text-[22px] leading-7 font-normal tracking-[0.01em] text-on-surface cursor-default">
        {{ title }}
    </h2>

    <hr class="mt-1 mb-2 border-t border-outline-variant" />

<div class="flex items-center justify-center py-1">
  <mat-icon
    aria-hidden="true"
    class="material-icons notranslate block !m-0 !p-0 !w-[195px] !h-[195px] !min-w-[195px] !min-h-[195px] !text-[195px] !leading-none"
    style="color: var(--mat-sys-primary)"
  >
    {{ icon }}
  </mat-icon>
</div>

<hr class="mt-2 mb-2 border-t border-outline-variant" />

    <div class="mt-1 flex flex-col">
      <p
        #subtitleEl
        [matTooltip]="subtitle || ''"
        [matTooltipDisabled]="isSubtitleTooltipDisabled(subtitleEl)"
        matTooltipPosition="above"
        class="m-0 min-h-[55px] line-clamp-2 text-[13px] leading-[1.4] break-words text-on-surface-variant cursor-default">
        {{ subtitle }}
      </p>

      <div class="mt-3 flex justify-end">
        <button
          mat-flat-button
          class="min-w-35 px-6 py-2 text-[13px] font-medium shadow-none bg-tertiary text-on-tertiary"
          (click)="buttonClick.emit()"
        >
          {{ buttonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
