<div class="flex items-center justify-between px-6 py-3 min-h-20 bg-surface-variant">
  <!-- Left: Title + Description -->
  <div class="flex flex-col justify-center">
    <span class="text-[16px] font-semibold leading-tight text-on-surface-variant">
      {{ title() }}
    </span>
    @if (description()) {
      <span class="text-[13px] leading-tight mt-1 text-on-surface-variant/75">
        {{ description() }}
      </span>
    }
  </div>

  <!-- Right: Action Buttons — large screens -->
  @if (actions().length) {
    <div class="hidden sm:flex items-center justify-center shrink-0">
      @for (action of actions(); track action.icon) {
        <div class="flex items-center">
          <div class="w-px h-8 bg-outline-variant mx-1"></div>
          <button
            mat-icon-button
            class="flex flex-col items-center justify-center !w-auto !h-auto !px-3 !py-1 gap-1.5"
            [attr.aria-label]="action.label"
            (click)="action.onClick()"
          >
            <mat-icon class="!text-[22px] !w-[22px] !h-[22px] !leading-none" style="color: var(--mat-sys-primary)">
              {{ action.icon }}
            </mat-icon>
            <span class="text-[11px] leading-none font-medium whitespace-nowrap" style="color: var(--mat-sys-primary)">
              {{ action.label }}
            </span>
          </button>
        </div>
      }
    </div>

    <!-- Right: Three dots menu — small screens -->
    <div class="flex sm:hidden shrink-0 ml-2">
      <button mat-icon-button [matMenuTriggerFor]="actionsMenu" aria-label="Azioni">
        <mat-icon style="color: var(--mat-sys-primary)">more_vert</mat-icon>
      </button>
      <mat-menu #actionsMenu="matMenu">
        @for (action of actions(); track action.icon) {
          <button mat-menu-item (click)="action.onClick()">
            <mat-icon style="color: var(--mat-sys-primary)">{{ action.icon }}</mat-icon>
            <span>{{ action.label }}</span>
          </button>
        }
      </mat-menu>
    </div>
  }
</div>
