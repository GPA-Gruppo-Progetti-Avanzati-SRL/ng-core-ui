<mat-form-field class="w-full">
  <mat-label>{{ label() }}</mat-label>

  <input
    matInput
    readonly
    [value]="selected()?.label ?? ''"
    [disabled]="disabled()"
    class="cursor-default"
  />

  <!-- Bottone apri dialog -->
  <button
    matSuffix
    mat-icon-button
    [disabled]="disabled()"
    [matTooltip]="'Seleziona ' + label()"
    (click)="open()"
  >
    <mat-icon class="!text-[20px] !w-[20px] !h-[20px] !leading-none">search</mat-icon>
  </button>

  <!-- Bottone cancella selezione -->
  @if (selected() && !disabled()) {
    <button
      matSuffix
      mat-icon-button
      matTooltip="Rimuovi selezione"
      (click)="clear()"
    >
      <mat-icon class="!text-[18px] !w-[18px] !h-[18px] !leading-none">close</mat-icon>
    </button>
  }

  @if (formField()().errors()?.length) {
    <mat-error>{{ formField()().errors()[0].message ?? 'Campo non valido' }}</mat-error>
  }
</mat-form-field>
