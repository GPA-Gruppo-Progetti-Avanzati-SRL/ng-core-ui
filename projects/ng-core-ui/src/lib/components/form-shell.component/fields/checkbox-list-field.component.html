<div class="relative mb-5 sm:mb-4">
  @if (label()) {
    <div
      class="pointer-events-none absolute left-3 -top-[0.45rem] z-10 text-xs font-normal leading-none text-slate-600 dark:text-slate-300"
    >
      <span class="px-1 bg-surface dark:bg-slate-900">
        {{ label() }}
      </span>
    </div>
  }

  <div
    [class]="
    inline()
      ? 'flex min-h-[48px] rounded-md border border-slate-500 bg-transparent px-3 py-2 dark:border-slate-600/60'
      : 'flex min-h-[48px] rounded-md border border-slate-500 bg-transparent px-3 py-2 dark:border-slate-600/60'
  "
  >
    <div
      [class]="
    inline()
      ? 'flex w-full flex-col gap-2 md:flex-row md:flex-wrap md:items-start md:gap-x-6 md:gap-y-2'
      : 'flex w-full flex-col items-start gap-2'
  "
    >
      @for (opt of resolvedOptions(); track opt.value) {
        <mat-checkbox
          class="min-w-0"
          [checked]="isSelected(opt.value)"
          (change)="toggle(opt.value)"
        >
      <span class="block whitespace-normal break-words leading-5">
        {{ opt.label }}
      </span>
        </mat-checkbox>
      }
    </div>
  </div>

  @if (formField()().touched() && formField()().errors().length) {
    <div class="px-1 pt-1 text-xs text-red-600">
      {{ formField()().errors()[0]?.message ?? 'Campo non valido' }}
    </div>
  }
</div>
