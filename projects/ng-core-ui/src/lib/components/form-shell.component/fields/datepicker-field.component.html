<mat-form-field appearance="outline" floatLabel="always" class="w-full">
  <mat-label>{{ label() }}</mat-label>
  <input matInput [matDatepicker]="picker" [formField]="formField()"
    [required]="required()" [errorStateMatcher]="errorMatcher" class="!text-sm" />
  <mat-datepicker-toggle matIconSuffix [for]="picker" [hidden]="!editable()"/>
  <mat-datepicker #picker />
  <!-- Sempre in DOM (ContentChildren stabile): la visibilità è pilotata da errorState. -->
  <mat-error>{{ errorMessage() }}</mat-error>
</mat-form-field>
