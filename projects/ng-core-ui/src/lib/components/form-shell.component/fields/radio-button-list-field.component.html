<div class="relative mb-5 sm:mb-4">
  @if (label()) {
    <div
      class="pointer-events-none absolute left-3 -top-[0.45rem] z-10 text-xs font-normal leading-none text-slate-600 dark:text-slate-300"
    >
      <span class="px-1 bg-surface dark:bg-slate-900">
        {{ label() }}
      </span>
    </div>
  }

  <div
    [class]="
      inline()
        ? 'flex min-h-[56px] items-center rounded-md border border-slate-500 bg-transparent px-3 dark:border-slate-600/60'
        : 'rounded-md border border-slate-500 bg-transparent px-3 pt-2.5 pb-2.5 dark:border-slate-600/60'
    "
  >
    <mat-radio-group
      [formField]="formField()"
      [class]="
        inline()
          ? 'flex flex-row items-center gap-x-6'
          : 'flex flex-col items-start gap-2.5'
      "
    >
      @for (opt of resolvedOptions(); track opt.value) {
        <mat-radio-button [value]="opt.value">
          {{ opt.label }}
        </mat-radio-button>
      }
    </mat-radio-group>
  </div>

  @if (formField()().touched() && formField()().errors().length) {
    <div class="px-1 pt-1 text-xs text-red-600">
      {{ formField()().errors()[0]?.message ?? 'Campo non valido' }}
    </div>
  }
</div>
