<div class="flex flex-col gap-2 py-2">
  @if (label()) {
    <label class="text-sm font-medium text-gray-700">{{ label() }}</label>
  }
  <mat-radio-group [formField]="formField()" [class]="inline() ? 'flex flex-row flex-wrap gap-x-6 gap-y-1' : 'flex flex-col gap-2'">
    @for (opt of options(); track opt.value) {
      <mat-radio-button [value]="opt.value">{{ opt.label }}</mat-radio-button>
    }
  </mat-radio-group>
  @if (formField()().touched() && formField()().errors().length) {
    <div class="text-xs text-red-600 px-1">{{ formField()().errors()[0]?.message ?? 'Campo non valido' }}</div>
  }
</div>
