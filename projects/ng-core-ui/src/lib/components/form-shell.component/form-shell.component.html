<div class="ui w-full" [style.padding]="padding()">
  <div
    class="grid"
    [style.grid-template-columns]="'repeat(' + currentColumns() + ', minmax(0, 1fr))'"
    [style.row-gap]="rowGap()"
    [style.column-gap]="columnGap()"
  >
    @for (f of fields(); track $index) {
      @if (!isHidden(f)) {
        <div [style.grid-column]="'span ' + clampSpan(f)">
          <ng-container
            [ngComponentOutlet]="f.component"
            [ngComponentOutletInputs]="fieldInputs(f)"
          />
        </div>
      }
    }

    @if (inlineActions().length) {
      <div class="flex min-h-[48px] items-center gap-2 lg:self-start lg:mt-[0em]">
        @for (a of inlineActions(); track $index) {
          <core-button
            [icon]="a.icon"
            [label]="a.label"
            [tooltip]="a.tooltip ?? ''"
            [variant]="a.variant ?? 'icon'"
            [color]="a.color ?? 'tertiary'"
            [disabled]="a._disabled"
            (click)="!a._disabled && a.onClick()"
          />
        }
      </div>
    }
  </div>
</div>

@if (footerActions().length) {
  <div class="mt-6 flex flex-wrap items-center justify-end gap-2">
    @for (a of footerActions(); track $index) {
      <core-button
        [icon]="a.icon"
        [label]="a.label"
        [tooltip]="a.tooltip ?? ''"
        [variant]="a.variant ?? 'filled'"
        [color]="a.color ?? 'tertiary'"
        [disabled]="a._disabled"
        (click)="!a._disabled && a.onClick()"
      />
    }
  </div>
}
